<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ipix.my.id | iPixChaT</title>
    <script>window.$crisp=[];window.CRISP_WEBSITE_ID="a23603f3-1d3e-4482-9304-f23df40093df";(function(){d=document;s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.head.appendChild(s)})();</script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'-apple-system',BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
        body{background:#0b0f19;color:#f3f4f6;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow-x:hidden;position:relative}

        .top-left-nav{position:absolute;top:20px;left:20px;z-index:20}
        .top-right-nav{position:absolute;top:20px;right:20px;z-index:20}
        
        .pill-link{
            display:inline-block;
            background:rgba(255,255,255,.05);
            color:#fff;
            padding:8px 20px;
            border-radius:50px;
            font-size:.9rem;
            font-weight:600;
            text-decoration:none;
            border:1px solid rgba(255,255,255,.1);
            backdrop-filter:blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }
        .pill-link:hover{
            transform:scale(1.08);
            background:rgba(255,255,255,.15);
        }
        .pill-link:active{
            transform:scale(0.98);
        }

        .curve {
            position: absolute;
            top: 125px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 60px;
            border: 3px solid #22d3ee;
            border-radius: 50%;
            border-top: none;
            z-index: -1;
            opacity: 0.85;
        }

        .chat-container{display:flex;justify-content:center;align-items:center;gap:35px;margin:35px 0 20px;position:relative;width:100%;max-width:400px}
        .character-wrapper{position:relative;display:flex;flex-direction:column;align-items:center;width:125px;height:160px;z-index:10}
        .img-container{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(0.34,1.56,0.64,1)}
        .person-img{position:absolute;top:0;left:0;width:100%;height:auto;transition:opacity .5s ease-in-out}

        .float-anim{animation:float 4.2s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

        .active-move{transform:scale(1.18) translateY(-15px);animation:softSway 3.8s ease-in-out infinite}
        @keyframes softSway{0%,100%{transform:scale(1.18) translateY(-15px) rotate(0deg)}25%{transform:scale(1.18) translateY(-10px) rotate(2deg)}50%{transform:scale(1.18) translateY(-20px) rotate(-1.5deg)}75%{transform:scale(1.18) translateY(-13px) rotate(1.8deg)}}

        .deco{position:absolute;top:-55px;border-radius:50px;padding:7px 16px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;white-space:nowrap;animation:floatBubble 3.6s ease-in-out infinite;box-shadow:0 4px 15px rgba(0,0,0,.4);opacity:0;min-height:32px;z-index:12}
        @keyframes floatBubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

        #bubbleLeft{background:rgba(74,222,128,.25);color:#4ade80;border:1px solid rgba(74,222,128,.7)}
        #bubbleRight{background:rgba(34,211,238,.25);color:#67e8f9;border:1px solid rgba(34,211,238,.7)}

        .card{position:relative;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(18px);padding:85px 30px 45px;border-radius:28px;width:90%;max-width:460px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5);margin-top:20px}

        .card-logo{
            position:absolute;
            top:-68px;
            left:50%;
            transform:translateX(-50%);
            width:125px;
            height:125px;
            background:#0b0f19;
            border-radius:50%;
            border:5px solid transparent;
            background-image: linear-gradient(#0b0f19, #0b0f19), linear-gradient(90deg,#22c55e,#06b6d4);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            overflow:hidden;
            z-index:20;
            box-shadow:0 10px 30px rgba(0,0,0,.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.6s ease;
            animation: logoSpin 2.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .card-logo:hover{
            transform:translateX(-50%) scale(1.05);
        }
        .card-logo::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 3px solid rgba(34,211,238,0.5);
            border-radius: 50%;
            z-index: -1;
            animation: ringPulse 4s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.08); }
        }

        @keyframes logoSpin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        .fade-text{opacity:0;animation:fadeInUp 1s ease forwards;animation-delay:.5s}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}

        .typing-cursor{border-right:2.5px solid #22d3ee;animation:blink-caret .8s step-end infinite}
        @keyframes blink-caret{from,to{border-color:transparent}50%{border-color:#22d3ee}}

        h1{font-size:1.65rem;font-weight:700;margin-bottom:10px;color:#fff}
        #typing-text{font-size:1.05rem;color:#a1a1aa;line-height:1.5;margin-bottom:28px;min-height:1.6em}

        .cta-btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:100%;
            padding:16px 20px;
            color:#000;
            border:none;
            border-radius:16px;
            font-size:1.05rem;
            font-weight:700;
            cursor:pointer;
            background:linear-gradient(90deg,#22c55e,#06b6d4);
            text-decoration:none;
            margin-top:5px;
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .cta-btn:hover{
            transform: translateY(-4px) scale(1.02);
        }
    </style>
</head>
<body>
    <div class="top-left-nav"><a href="https://ipix.fun" class="pill-link">iPix.Fun</a></div>
    <div class="top-right-nav"><a href="https://ipix.my.id" class="pill-link">ipix.my.id</a></div>

    <div class="chat-container">
        <div class="curve"></div>
        
        <div class="character-wrapper">
            <div class="deco" id="bubbleLeft">...</div>
            <div class="img-container float-anim" id="containerLeft">
                <img src="pemanggil_kiri_3.png" id="imgLeft1" class="person-img" style="opacity:1" alt="">
                <img src="pemanggil_kiri.png" id="imgLeft2" class="person-img" style="opacity:0" alt="">
            </div>
        </div>
        <div class="character-wrapper">
            <div class="deco" id="bubbleRight">...</div>
            <div class="img-container float-anim" id="containerRight">
                <img src="pemanggil_kanan.png" id="imgRight1" class="person-img" style="opacity:1" alt="">
                <img src="pemanggil_kanan_4.png" id="imgRight2" class="person-img" style="opacity:0" alt="">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-logo">
            <!-- Logo -->
            <img src="logo.png" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
        </div>
        <h1 class="fade-text">Halo kamu !</h1>
        <p id="typing-text"></p>
        <a href="https://ipixchat.my.id" class="cta-btn">Mulai Obrolan di iPixChat</a>
    </div>

    <div style="margin-top: 40px; text-align: center; opacity: 0.7; font-size: 0.95rem; width: 100%; max-width: 460px;">
        <a href="https://ipixchat.my.id" style="color: #67e8f9; text-decoration: none; font-weight: 600;">
            2026 | chat with ♡ iPixChaT
        </a>
    </div>

    <script>
        // Script tetap sama
        const bLeft=document.getElementById('bubbleLeft'), bRight=document.getElementById('bubbleRight');
        const cLeft=document.getElementById('containerLeft'), cRight=document.getElementById('containerRight');
        let step=0, bubbleTimeout, nextDialogTimeout;

        const daftarFoto = {
            kiri: ["pemanggil_kiri.png", "pemanggil_kiri_2.png", "pemanggil_kiri_3.png"],
            kanan: ["pemanggil_kanan.png", "pemanggil_kanan_2.png", "pemanggil_kanan_3.png", "pemanggil_kanan_4.png"]
        };

        function animateCharacter(side) {
            if (side === 'left') {
                cLeft.classList.add('active-move'); cLeft.classList.remove('float-anim');
                cRight.classList.remove('active-move'); cRight.classList.add('float-anim');
            } else {
                cRight.classList.add('active-move'); cRight.classList.remove('float-anim');
                cLeft.classList.remove('active-move'); cLeft.classList.add('float-anim');
            }
        }

        function changeImageCrossFade(side, newSrc) {
            const img1 = document.getElementById(`img${side==='left'?'Left':'Right'}1`);
            const img2 = document.getElementById(`img${side==='left'?'Left':'Right'}2`);
            if (getComputedStyle(img1).opacity === "1") {
                img2.src = newSrc; img2.style.opacity = 1; img1.style.opacity = 0;
            } else {
                img1.src = newSrc; img1.style.opacity = 1; img2.style.opacity = 0;
            }
        }

        function typeWriterBubble(el, text, speed, callback) {
            let i = 0; el.innerText = ""; clearTimeout(bubbleTimeout);
            function type() {
                if (i < text.length) {
                    el.innerText = text.substring(0, i + 1);
                    i++;
                    bubbleTimeout = setTimeout(type, speed);
                } else if (callback) callback();
            }
            type();
        }

        function updateConversation() {
            clearTimeout(nextDialogTimeout);
            const delay = (ms) => new Promise(r => nextDialogTimeout = setTimeout(r, ms));

            switch(step){
                case 0: changeImageCrossFade('left',daftarFoto.kiri[2]); bLeft.style.opacity=1; bRight.style.opacity=0; animateCharacter('left');
                    typeWriterBubble(bLeft,"Hai saya iPix Salam kenal",45,()=>delay(1700).then(()=>{step=1;updateConversation()})); break;
                case 1: changeImageCrossFade('right',daftarFoto.kanan[3]); bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right');
                    typeWriterBubble(bRight,"Hai juga, saya Chubby Salam kenal",45,()=>delay(1800).then(()=>{step=2;updateConversation()})); break;
                case 2: changeImageCrossFade('right',daftarFoto.kanan[0]); bRight.innerText="Kamu apa kabar ?"; bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right'); delay(1550).then(()=>{step=3;updateConversation()}); break;
                case 3: changeImageCrossFade('left',daftarFoto.kiri[2]); bLeft.innerText="Baik"; bLeft.style.opacity=1; bRight.style.opacity=0; animateCharacter('left'); delay(1250).then(()=>{step=4;updateConversation()}); break;
                case 4: changeImageCrossFade('left',daftarFoto.kiri[0]); bLeft.innerText="Apa kabar kamu ?"; bLeft.style.opacity=1; bRight.style.opacity=0; animateCharacter('left'); delay(1650).then(()=>{step=5;updateConversation()}); break;
                case 5: changeImageCrossFade('right',daftarFoto.kanan[0]); bRight.innerText="Baik juga"; bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right'); delay(1450).then(()=>{step=6;updateConversation()}); break;
                case 6: changeImageCrossFade('right',daftarFoto.kanan[0]); bRight.innerText="Tinggal dimana?"; bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right'); delay(1600).then(()=>{step=7;updateConversation()}); break;
                case 7: changeImageCrossFade('left',daftarFoto.kiri[0]); bLeft.innerText="Dihatimuuu"; bLeft.style.opacity=1; bRight.style.opacity=0; animateCharacter('left'); delay(1750).then(()=>{step=8;updateConversation()}); break;
                case 8: changeImageCrossFade('right',daftarFoto.kanan[2]); bRight.innerText="Hoooeeekkk"; bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right'); delay(1450).then(()=>{step=9;updateConversation()}); break;
                case 9: changeImageCrossFade('right',daftarFoto.kanan[1]); bRight.innerText="Gombal"; bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right'); delay(1400).then(()=>{step=10;updateConversation()}); break;
                case 10: changeImageCrossFade('left',daftarFoto.kiri[1]); bLeft.innerText="Hahaha"; bLeft.style.opacity=1; bRight.style.opacity=0; animateCharacter('left'); delay(1650).then(()=>{step=11;updateConversation()}); break;
                case 11: changeImageCrossFade('right',daftarFoto.kanan[0]); bRight.innerText="Hmm..."; bRight.style.opacity=1; bLeft.style.opacity=0; animateCharacter('right'); delay(2100).then(()=>{step=0;updateConversation()}); break;
            }
        }

        setTimeout(updateConversation,700);

        const textElement=document.getElementById("typing-text");
        const fullText="Ada pertanyaan atau obrolan ?";
        let i=0;
        function typeWriter(){
            if(i<fullText.length){textElement.innerHTML=fullText.substring(0,i+1)+'<span class="typing-cursor"></span>';i++;setTimeout(typeWriter,48)}
            else{textElement.innerHTML=fullText}
        }
        setTimeout(typeWriter,1100);
    </script>
</body>
</html>
