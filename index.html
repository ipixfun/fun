<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang di Layanan Kami</title>
    
    <!-- SCRIPT UTAMA CRISP CHAT (Wajib ada di Head agar sistem mendeteksi akunmu) -->
    <script type="text/javascript">
        window.$crisp = [];
        window.CRISP_WEBSITE_ID = "a23603f3-1d3e-4482-9304-f23df40093df";
        (function() {
            d = document;
            s = d.createElement("script");
            s.src = "https://client.crisp.chat/l.js";
            s.async = 1;
            d.getElementsByTagName("head")[0].appendChild(s);
        })();
    </script>

    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Elemen Dekorasi Latar Belakang */
        .bg-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(2, 184, 117, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 1;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 1;
        }

        /* Container Utama (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Ikon Dekoratif */
        .icon-wrapper {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #02b875, #0ea5e9);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 8px 20px rgba(2, 184, 117, 0.3);
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 60%, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1rem;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Tombol Interaktif */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            background-color: #ffffff;
            color: #0b0f19;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .cta-btn:hover {
            background-color: #02b875;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(2, 184, 117, 0.4);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        /* Animasi */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Dekorasi Latar Belakang -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <!-- Konten Utama -->
    <div class="card">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
            </svg>
        </div>
        
        <h1>Halo, Ada yang Bisa Dibantu?</h1>
        <p>Kami siap melayani pertanyaan Anda. Klik tombol di bawah ini untuk langsung membuka ruang obrolan bantuan.</p>
        
        <!-- TOMBOL DENGAN INSTRUKSI KODE CRISP UNTUK MEMBUKA CHAT BOX -->
        <button class="cta-btn" onclick="window.$crisp.push(['do', 'chat:open'])">
            Mulai Obrolan Sekarang
        </button>
    </div>

</body>
</html>
