<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script type="text/javascript">
        window.$crisp = [];
        window.CRISP_WEBSITE_ID = "a23603f3-1d3e-4482-9304-f23df40093df";
        (function() {
            d = document;

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }
        
        @keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }
        .top-left-nav { position: absolute; top: 20px; left: 20px; }
        .top-right-nav { position: absolute; top: 20px; right: 20px; }
        
        /* Logo Custom */
        .bottom-left-logo { 
            position: absolute; bottom: 20px; left: 20px; width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0); animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 1s;
        }
        .bottom-left-logo img { width: 100%; height: 100%; object-fit: contain; }

        [data-chat-status] { opacity: 0; transform: scale(0); animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 1s; }
        
        .pill-link { display: inline-block; background: rgba(255, 255, 255, 0.05); color: white; padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; font-weight: 600; text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); transition: transform 0.3s ease; }
        .pill-link:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.1); }

        /* Struktur Tampilan 2 Karakter Tetap Asli */
        .chat-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 40px; position: relative; width: 100%; max-width: 600px; flex-wrap: wrap; }
        .character-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; width: calc(50% - 10px); max-width: 120px; }
        
        .person-img { width: 100%; height: auto; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .active-move { transform: scale(1.1) translateY(-15px); animation: shake 0.3s ease-in-out infinite; }
        @keyframes shake { 0%, 100% { transform: scale(1.1) translateY(-15px) rotate(0deg); } 25% { transform: scale(1.1) translateY(-15px) rotate(3deg); } 75% { transform: scale(1.1) translateY(-15px) rotate(-3deg); } }

        .deco { position: absolute; top: -50px; background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 6px 15px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; white-space: nowrap; animation: float 3s ease-in-out infinite; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: opacity 0.5s ease; opacity: 0; z-index: 10; }
        
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); padding: 40px 30px; border-radius: 24px; width: 90%; max-width: 480px; text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }

        .fade-text { opacity: 0; animation: fadeInUp 1s ease forwards; animation-delay: 0.5s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .typing-cursor { border-right: 2px solid #02b875; animation: blink-caret 0.75s step-end infinite; }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #02b875 } }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
        #typing-text { font-size: 1rem; color: #9ca3af; line-height: 1.6; margin-bottom: 30px; min-height: 1.6em; }

        .cta-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 16px 24px; color: #000000; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; background: linear-gradient(90deg, #02b875, #0ea5e9, #02b875); background-size: 300% 300%; box-shadow: 0 4px 15px rgba(2, 184, 117, 0.3); animation: gradientMove 4s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <div class="top-left-nav">
        <a href="https://ipix.fun" class="pill-link">iPix.Fun</a>
    </div>

    <div class="top-right-nav">
        <a href="https://ipix.my.id" class="pill-link">ipix.my.id</a>
    </div>

    <div class="bottom-left-logo">
        <img src="logo.png" alt="Logo">
    </div>

    <div class="chat-container">
        <div class="character-wrapper">
            <div class="deco" id="bubble1">...</div>
            <img src="pemanggil_kiri.png" id="img1" class="person-img float-anim" alt="Orang Kiri">
        </div>
        
        <div class="character-wrapper">
            <div class="deco" id="bubble2">...</div>
            <img src="pemanggil_kanan.png" id="img2" class="person-img float-anim" alt="Orang Kanan">
        </div>
    </div>

    <div class="card">
        <h1 class="fade-text">Halo kamu !</h1>
        <p id="typing-text"></p>
        <button class="cta-btn" onclick="window.$crisp.push(['do', 'chat:open'])">
            Mulai Obrolan 
        </button>
    </div>

    <script>
        const bubbles = [
            document.getElementById('bubble1'),
            document.getElementById('bubble2')
        ];
        const imgs = [
            document.getElementById('img1'),
            document.getElementById('img2')
        ];
        
        let step = 0;

        // ALUR PERCAKAPAN DISESUAIKAN: Kiri 1 -> Kiri 2 -> Kanan 1 -> Kanan 2
        const conversation = [
            { side: 0, text: "Halo semuanya" },     // Step 0: Kiri 1
            { side: 0, text: "Gimana kabarnya ?" },  // Step 1: Kiri 2
            { side: 1, text: "Hai !" },              // Step 2: Kanan 1
            { side: 1, text: "Baik ! Kamu ?" }       // Step 3: Kanan 2
        ];

        // Daftar 4 foto di folder Anda
        const daftarFoto = {
            kiri: ["pemanggil_kiri.png", "pemanggil_kiri_2.png"],
            kanan: ["pemanggil_kanan.png", "pemanggil_kanan_2.png"]
        };

        function animateCharacter(activeSideIndex) {
            imgs.forEach((img, index) => {
                if (index === activeSideIndex) {
                    img.classList.add('active-move');
                    img.classList.remove('float-anim');
                } else {
                    img.classList.remove('active-move');
                    img.classList.add('float-anim');
                }
            });
        }

        function updateConversation() {
            const currentDialogue = conversation[step];
            
            // Tampilkan balon chat yang sesuai
            bubbles.forEach((bubble, index) => {
                if (index === currentDialogue.side) {
                    bubble.innerText = currentDialogue.text;
                    bubble.style.opacity = 1;
                } else {
                    bubble.style.opacity = 0;
                }
            });

            // LOGIKA GANTIAN FOTO SESUAI LANGKAH CHAT
            if (step === 0) {
                imgs[0].src = daftarFoto.kiri[0];  // Kiri pakai Foto 1
            } else if (step === 1) {
                imgs[0].src = daftarFoto.kiri[1];  // Kiri berganti ke Foto 2
            } else if (step === 2) {
                imgs[1].src = daftarFoto.kanan[0]; // Kanan pakai Foto 1
            } else if (step === 3) {
                imgs[1].src = daftarFoto.kanan[1]; // Kanan berganti ke Foto 2
            }

            animateCharacter(currentDialogue.side);
            
            step = (step + 1) % conversation.length;
        }

        setInterval(updateConversation, 2000);
        setTimeout(updateConversation, 500);

        const textElement = document.getElementById("typing-text");
        const fullText = "Ada pertanyaan atau obrolan ?";
        let i = 0;
        function typeWriter() {
            if (i < fullText.length) {
                textElement.innerHTML = fullText.substring(0, i + 1
